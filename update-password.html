<!doctype html>
<html lang="tr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Şifre Yenile</title>
  <link rel="stylesheet" href="./styles.css" />
</head>
<body>
  <div class="shell">
    <section class="auth-card">
      <div class="brand-block">
        <p class="eyebrow">Private Admin</p>
        <h1>Yeni şifre belirle</h1>
        <p class="muted">Şifre kurtarma mailinden geldiysen yeni şifreni burada kaydet.</p>
      </div>

      <form id="password-form" class="stack">
        <label>
          Yeni şifre
          <input id="new-password" type="password" autocomplete="new-password" minlength="8" required />
        </label>
        <label>
          Yeni şifre tekrar
          <input id="new-password-confirm" type="password" autocomplete="new-password" minlength="8" required />
        </label>
        <button id="submit-btn" type="submit">Şifreyi güncelle</button>
        <p id="message" class="error"></p>
      </form>
    </section>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="./config.js"></script>
  <script>
    const { SUPABASE_URL, SUPABASE_PUBLISHABLE_KEY } = window.APP_CONFIG || {};
    const supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_PUBLISHABLE_KEY, {
      auth: {
        detectSessionInUrl: true,
        persistSession: true,
        autoRefreshToken: true,
        flowType: 'pkce'
      }
    });

    const form = document.querySelector('#password-form');
    const message = document.querySelector('#message');
    const passwordInput = document.querySelector('#new-password');
    const confirmInput = document.querySelector('#new-password-confirm');
    const submitBtn = document.querySelector('#submit-btn');

    let recoveryReady = false;

    function show(text, ok = false) {
      message.textContent = text;
      message.style.color = ok ? '#667066' : '#8a2d2d';
    }

    async function prepareRecoverySession() {
      show('Şifre yenileme bağlantısı kontrol ediliyor...', true);

      try {
        const url = new URL(window.location.href);
        const code = url.searchParams.get('code');
        const hash = new URLSearchParams(window.location.hash.replace(/^#/, ''));
        const accessToken = hash.get('access_token');
        const refreshToken = hash.get('refresh_token');

        if (code) {
          const { error } = await supabase.auth.exchangeCodeForSession(code);
          if (error) throw error;
          recoveryReady = true;
        } else if (accessToken && refreshToken) {
          const { error } = await supabase.auth.setSession({
            access_token: accessToken,
            refresh_token: refreshToken
          });
          if (error) throw error;
          recoveryReady = true;
        } else {
          const { data } = await supabase.auth.getSession();
          recoveryReady = !!data?.session;
        }

        if (recoveryReady) {
          show('Bağlantı doğrulandı. Yeni şifreni girip kaydedebilirsin.', true);
        } else {
          show('Şifre yenileme oturumu bulunamadı. Maildeki son reset linkini tekrar aç.');
        }
      } catch (error) {
        console.error(error);
        show('Şifre yenileme bağlantısı doğrulanamadı. Yeni bir reset maili gönder.');
      }
    }

    form.addEventListener('submit', async (event) => {
      event.preventDefault();

      const password = passwordInput.value;
      const confirm = confirmInput.value;

      if (password.length < 8) {
        show('Şifre en az 8 karakter olmalı.');
        return;
      }

      if (password !== confirm) {
        show('Şifreler aynı değil.');
        return;
      }

      submitBtn.disabled = true;
      submitBtn.textContent = 'Güncelleniyor...';

      try {
        const { data } = await supabase.auth.getSession();
        if (!data?.session && !recoveryReady) {
          show('Aktif şifre yenileme oturumu yok. Reset mailindeki linki yeniden aç.');
          submitBtn.disabled = false;
          submitBtn.textContent = 'Şifreyi güncelle';
          return;
        }

        const { error } = await supabase.auth.updateUser({ password });
        if (error) throw error;

        show('Şifre güncellendi. Giriş sayfasına yönlendiriliyorsun.', true);
        setTimeout(() => {
          window.location.href = './';
        }, 1200);
      } catch (error) {
        console.error(error);
        show('Şifre güncellenemedi. Link süresi dolmuş olabilir; yeni reset maili gönder.');
        submitBtn.disabled = false;
        submitBtn.textContent = 'Şifreyi güncelle';
      }
    });

    prepareRecoverySession();
  </script>
</body>
</html>
