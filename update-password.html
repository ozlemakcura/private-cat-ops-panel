<!doctype html>
<html lang="tr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Şifre Yenile</title>
  <link rel="stylesheet" href="./styles.css" />
</head>
<body>
  <div class="shell">
    <section class="auth-card">
      <div class="brand-block">
        <p class="eyebrow">Private Admin</p>
        <h1>Yeni şifre belirle</h1>
        <p class="muted">Şifre kurtarma mailinden geldiysen yeni şifreni burada kaydet.</p>
      </div>

      <form id="password-form" class="stack">
        <label>
          Yeni şifre
          <input id="new-password" type="password" autocomplete="new-password" minlength="8" required />
        </label>
        <label>
          Yeni şifre tekrar
          <input id="new-password-confirm" type="password" autocomplete="new-password" minlength="8" required />
        </label>
        <button type="submit">Şifreyi güncelle</button>
        <p id="message" class="error"></p>
      </form>
    </section>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="./config.js"></script>
  <script>
    const { SUPABASE_URL, SUPABASE_PUBLISHABLE_KEY } = window.APP_CONFIG || {};
    const supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_PUBLISHABLE_KEY);

    const form = document.querySelector('#password-form');
    const message = document.querySelector('#message');
    const passwordInput = document.querySelector('#new-password');
    const confirmInput = document.querySelector('#new-password-confirm');

    supabase.auth.onAuthStateChange((event) => {
      if (event === 'PASSWORD_RECOVERY') {
        message.textContent = 'Yeni şifreni girip kaydedebilirsin.';
        message.style.color = '#667066';
      }
    });

    form.addEventListener('submit', async (event) => {
      event.preventDefault();
      message.textContent = '';

      const password = passwordInput.value;
      const confirm = confirmInput.value;

      if (password.length < 8) {
        message.textContent = 'Şifre en az 8 karakter olmalı.';
        return;
      }

      if (password !== confirm) {
        message.textContent = 'Şifreler aynı değil.';
        return;
      }

      const { error } = await supabase.auth.updateUser({ password });

      if (error) {
        message.textContent = 'Şifre güncellenemedi. Link süresi dolmuş olabilir; yeni reset maili gönder.';
        return;
      }

      message.textContent = 'Şifre güncellendi. Giriş sayfasına yönlendiriliyorsun.';
      message.style.color = '#667066';
      setTimeout(() => {
        window.location.href = './';
      }, 1200);
    });
  </script>
</body>
</html>
